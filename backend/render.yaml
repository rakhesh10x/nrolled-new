services:
  - type: web
    name: hr-assistant-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: OXLO_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./hr_assistant.db
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:5173
